<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>Renata — Beta-Recruitment CRM</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cpath d='M25 14 L39 14 L40 86 L24 86 Z' fill='%23574FC7'/%3E%3Ccircle cx='50' cy='36' r='22' fill='%23574FC7'/%3E%3Cpath d='M44 54 L56 51 L85 86 L68 86 Z' fill='%23574FC7'/%3E%3Cpath d='M50 27 L60 37 L50 47 L40 37 Z' fill='%23F7F6F2'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400;1,6..72,500&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F7F6F2;--card:#FFFFFF;--ink:#16161F;--ink-soft:#5A5A6E;
    --gold:#B5852E;--gold-soft:#EFE2C4;
    --line:#E7E5DD;--line-soft:#F0EEE8;
    --violet:#574FC7;--violet-soft:#EDEBFA;--violet-ink:#332C8A;
    --teal:#0F7256;--teal-soft:#E2F4ED;
    --amber:#8A5A0C;--amber-soft:#FAF0DC;--alert:#A6342E;--alert-soft:#FAEAE7;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--paper);color:var(--ink);
    font-family:"Inter",system-ui,sans-serif;font-size:14.5px;line-height:1.5;-webkit-font-smoothing:antialiased;}
  .voice{font-family:"Newsreader",Georgia,serif;}
  .mono{font-family:"IBM Plex Mono",monospace;}
  a{color:var(--violet-ink);}
  .wrap{max-width:1180px;margin:0 auto;padding:26px 20px 90px;}

  header.top{display:flex;align-items:center;gap:14px;border-bottom:1px solid var(--line);padding-bottom:20px;flex-wrap:wrap;}
  .wm{font-family:"Newsreader",serif;font-weight:500;font-size:27px;display:flex;align-items:center;gap:11px;}
  .wm small{font-family:"Inter";font-weight:600;font-size:11px;letter-spacing:.14em;text-transform:uppercase;
    color:var(--violet);background:var(--violet-soft);padding:4px 9px;border-radius:7px;margin-left:4px;}
  header.top .meta{margin-left:auto;text-align:right;font-size:12px;color:var(--ink-soft);}
  .modebadge{font-family:"IBM Plex Mono",monospace;font-size:10.5px;letter-spacing:.06em;padding:4px 9px;border-radius:7px;}
  .modebadge.local{background:var(--amber-soft);color:var(--amber);}
  .modebadge.shared{background:var(--teal-soft);color:var(--teal);}
  .who-badge{font-size:11.5px;color:var(--ink-soft);}
  .linkbtn{font-family:inherit;font-size:11.5px;border:none;background:none;color:var(--violet-ink);cursor:pointer;text-decoration:underline;padding:0;}

  nav.tabs{display:flex;gap:6px;margin:20px 0 22px;flex-wrap:wrap;}
  nav.tabs button{font-family:inherit;font-size:13.5px;font-weight:500;color:var(--ink-soft);
    background:transparent;border:1px solid transparent;border-radius:10px;padding:9px 15px;cursor:pointer;}
  nav.tabs button:hover{background:var(--line-soft);}
  nav.tabs button.on{background:var(--ink);color:#fff;}

  .panel{display:none;}
  .panel.on{display:block;animation:fade .35s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}
  @media(prefers-reduced-motion:reduce){.panel.on{animation:none;}}

  h2.sec{font-family:"Newsreader",serif;font-weight:500;font-size:22px;margin:0 0 4px;letter-spacing:-.01em;}
  .sub{color:var(--ink-soft);font-size:13px;margin-bottom:18px;max-width:74ch;}
  .eyebrow{font-family:"IBM Plex Mono",monospace;font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--violet);margin-bottom:10px;}
  .seclabel{font-family:"IBM Plex Mono",monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-soft);margin:18px 0 8px;}

  .grid{display:grid;gap:14px;}
  .g4{grid-template-columns:repeat(4,1fr);}
  .g3{grid-template-columns:repeat(3,1fr);}
  .g2{grid-template-columns:1.25fr 1fr;}
  @media(max-width:900px){.g4{grid-template-columns:repeat(2,1fr);}.g3,.g2{grid-template-columns:1fr;}}
  .card{background:var(--card);border:1px solid var(--line);border-radius:15px;padding:18px;}
  .kpi .n{font-family:"IBM Plex Mono",monospace;font-size:30px;font-weight:500;line-height:1;}
  .kpi .l{font-size:12px;color:var(--ink-soft);margin-top:7px;}
  .kpi .l b{color:var(--ink);font-weight:600;}

  .northstar{background:var(--ink);color:#fff;border-radius:18px;padding:22px 24px;display:flex;align-items:center;gap:26px;flex-wrap:wrap;}
  .northstar .big{font-family:"IBM Plex Mono",monospace;font-size:44px;line-height:1;}
  .northstar .big b{color:#9CE3CC;}
  .northstar .cap{font-family:"Newsreader",serif;font-size:18px;line-height:1.4;max-width:40ch;}
  .northstar .cap span{color:#C9C4F2;}

  .queue{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:14px;}
  @media(max-width:900px){.queue{grid-template-columns:1fr;}}
  .qcol{background:var(--card);border:1px solid var(--line);border-radius:15px;padding:14px;}
  .qcol h4{margin:0 0 4px;font-size:13px;}
  .qcol .qd{font-size:11px;color:var(--ink-soft);margin-bottom:10px;}
  .qrow{display:flex;align-items:center;gap:9px;padding:9px 0;border-top:1px solid var(--line-soft);cursor:pointer;}
  .qrow:first-of-type{border-top:none;}
  .qrow:hover{background:var(--violet-soft);border-radius:8px;}
  .qrow .qn{font-weight:600;font-size:13px;}
  .qrow .qn small{font-weight:400;color:var(--ink-soft);}
  .qrow .qwhy{font-size:11.5px;color:var(--ink-soft);}
  .qempty{font-size:12px;color:var(--ink-soft);font-style:italic;padding:8px 0;}

  .bar{display:flex;align-items:center;gap:10px;margin:8px 0;font-size:12.5px;}
  .bar .lab{width:150px;color:var(--ink-soft);flex-shrink:0;}
  .bar .track{flex:1;height:9px;background:var(--line-soft);border-radius:6px;overflow:hidden;}
  .bar .fill{height:100%;border-radius:6px;}
  .bar .v{font-family:"IBM Plex Mono",monospace;color:var(--ink-soft);width:30px;text-align:right;}

  .controls{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:14px;}
  .controls input,.controls select{font-family:inherit;font-size:13px;border:1px solid var(--line);border-radius:9px;padding:8px 11px;background:var(--card);color:var(--ink);}
  .controls input.search{flex:1;min-width:170px;}
  .count{font-size:12px;color:var(--ink-soft);margin-left:auto;}

  table{width:100%;border-collapse:collapse;background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden;}
  th,td{text-align:left;padding:9px 12px;border-bottom:1px solid var(--line-soft);font-size:13px;vertical-align:middle;}
  th{font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-soft);font-weight:600;background:var(--line-soft);}
  tbody tr{cursor:pointer;}
  tbody tr:hover{background:var(--violet-soft);}
  td .firm{font-weight:600;}
  td .who{color:var(--ink-soft);font-size:12px;}

  .grade{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:7px;font-family:"IBM Plex Mono",monospace;font-weight:500;font-size:13px;}
  .grade.A{background:var(--teal-soft);color:var(--teal);}
  .grade.B{background:var(--violet-soft);color:var(--violet-ink);}
  .grade.C{background:var(--line-soft);color:var(--ink-soft);}
  .grade.x{background:var(--alert-soft);color:var(--alert);font-size:11px;}
  .grade.IN{background:var(--gold-soft);color:var(--amber);font-size:11px;}

  .pill{display:inline-block;font-size:11px;padding:3px 9px;border-radius:20px;background:var(--line-soft);color:var(--ink-soft);}
  .pill.beta{background:var(--violet-soft);color:var(--violet-ink);}
  .pill.expansion{background:var(--gold-soft);color:var(--amber);}
  .pill.excluded{background:var(--alert-soft);color:var(--alert);}
  .pill.inbound{background:var(--teal-soft);color:var(--teal);}
  .smono{font-family:"IBM Plex Mono",monospace;font-size:13px;}
  .stat{font-size:11px;padding:3px 9px;border-radius:7px;background:var(--line-soft);color:var(--ink-soft);white-space:nowrap;}
  .stat.warm{background:var(--teal-soft);color:var(--teal);}
  .stat.active{background:var(--violet-soft);color:var(--violet-ink);}
  .stat.beta{background:var(--ink);color:#fff;}
  .stat.cold{background:var(--line-soft);color:var(--ink-soft);}
  .flag{font-size:12px;margin-left:5px;}

  .scrim{position:fixed;inset:0;background:rgba(22,22,31,.42);opacity:0;pointer-events:none;transition:opacity .25s;z-index:40;}
  .scrim.on{opacity:1;pointer-events:auto;}
  .drawer{position:fixed;top:0;right:0;height:100%;width:min(580px,95vw);background:var(--paper);box-shadow:-18px 0 50px rgba(22,22,31,.18);transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);z-index:50;overflow-y:auto;}
  .drawer.on{transform:none;}
  @media(prefers-reduced-motion:reduce){.scrim,.drawer{transition:none;}}
  .drawer .dpad{padding:22px 24px 70px;}
  .drawer .close{position:sticky;top:0;float:right;font-size:20px;line-height:1;background:var(--card);border:1px solid var(--line);border-radius:9px;width:34px;height:34px;cursor:pointer;color:var(--ink-soft);}
  .dhead{display:flex;gap:16px;align-items:center;margin-bottom:6px;}
  .dhead .dn{font-family:"Newsreader",serif;font-size:22px;font-weight:500;line-height:1.15;}
  .dhead .dw{color:var(--ink-soft);font-size:13px;margin-top:3px;}
  .read{background:var(--ink);color:#fff;border-radius:13px;padding:14px 16px;margin:14px 0;font-family:"Newsreader",serif;font-size:16px;line-height:1.45;}
  .read b{color:#C9C4F2;font-weight:500;}
  .hook{background:var(--violet-soft);border-radius:12px;padding:13px 15px;margin:12px 0;font-size:13.5px;}
  .hook .hl{font-family:"IBM Plex Mono",monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--violet);margin-bottom:6px;}
  .hook .ht{font-family:"Newsreader",serif;font-size:15px;line-height:1.45;}
  .objection{background:var(--amber-soft);border-radius:12px;padding:13px 15px;margin:12px 0;font-size:13px;}
  .objection .hl{font-family:"IBM Plex Mono",monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--amber);margin-bottom:6px;}
  .chips{display:flex;flex-wrap:wrap;gap:7px;margin:6px 0 4px;}
  .chip{font-size:11.5px;padding:5px 10px;border-radius:8px;display:inline-flex;gap:6px;align-items:center;}
  .chip b{font-family:"IBM Plex Mono",monospace;font-weight:500;}
  .chip.violet{background:var(--violet-soft);color:var(--violet-ink);}
  .chip.teal{background:var(--teal-soft);color:var(--teal);}
  .chip.gold{background:var(--gold-soft);color:var(--amber);}
  .chip.amber{background:var(--amber-soft);color:var(--amber);}
  .chip.alert{background:var(--alert-soft);color:var(--alert);}
  .facts .f{display:flex;gap:12px;padding:7px 0;border-top:1px solid var(--line-soft);font-size:13px;}
  .facts .f:first-child{border-top:none;}
  .facts .f .k{width:120px;color:var(--ink-soft);flex-shrink:0;}
  .facts .f .v{flex:1;}
  .tags{display:flex;flex-wrap:wrap;gap:6px;}
  .tag{font-size:11px;background:var(--line-soft);color:var(--ink-soft);padding:3px 9px;border-radius:7px;}
  .dimrow{display:flex;align-items:center;gap:9px;margin:5px 0;font-size:11.5px;}
  .dimrow .dl{width:120px;color:var(--ink-soft);}
  .dimrow .dt{flex:1;height:7px;background:var(--line-soft);border-radius:5px;overflow:hidden;}
  .dimrow .df{height:100%;}
  .dimrow .dv{font-family:"IBM Plex Mono",monospace;color:var(--ink-soft);width:42px;text-align:right;}
  .ring-wrap{position:relative;}
  .ring-wrap .rn{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:"IBM Plex Mono",monospace;font-size:17px;font-weight:500;}

  .editor{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:14px 15px;margin:12px 0;}
  .editor .row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px;}
  .editor label{font-size:11px;color:var(--ink-soft);display:block;margin-bottom:4px;font-weight:600;}
  .editor select,.editor input,.editor textarea{font-family:inherit;font-size:13px;border:1px solid var(--line);border-radius:8px;padding:7px 9px;background:var(--paper);color:var(--ink);width:100%;}
  .editor textarea{min-height:54px;resize:vertical;}
  .fld{flex:1;min-width:130px;}
  .btn{font-family:inherit;font-size:12px;font-weight:600;border:1px solid var(--line);background:var(--card);border-radius:9px;padding:8px 13px;cursor:pointer;color:var(--violet-ink);white-space:nowrap;}
  .btn:hover{background:var(--violet-soft);border-color:var(--violet-soft);}
  .btn.primary{background:var(--ink);color:#fff;border-color:var(--ink);}
  .btn.primary:hover{background:#2A2A40;}
  .btn.small{padding:5px 9px;font-size:11px;}
  .btn.on{background:var(--teal-soft);border-color:var(--teal-soft);color:var(--teal);}

  .cad{display:flex;gap:10px;align-items:flex-start;padding:8px 0;border-top:1px solid var(--line-soft);}
  .cad:first-child{border-top:none;}
  .cad .cday{font-family:"IBM Plex Mono",monospace;font-size:11px;color:var(--ink-soft);width:46px;flex-shrink:0;padding-top:3px;}
  .cad .cmain{flex:1;}
  .cad .cch{font-size:10.5px;font-family:"IBM Plex Mono",monospace;color:var(--violet);text-transform:uppercase;letter-spacing:.06em;}
  .cad .clab{font-size:12.5px;}
  .cad .cdone{font-size:11px;color:var(--teal);margin-top:2px;}

  .pcard{border:1px solid var(--line);border-radius:16px;padding:20px;background:var(--card);position:relative;overflow:hidden;}
  .pcard .ptag{font-family:"IBM Plex Mono",monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;padding:3px 9px;border-radius:20px;display:inline-block;margin-bottom:10px;}
  .pcard h3{font-family:"Newsreader",serif;font-weight:500;font-size:20px;margin:2px 0 4px;}
  .pcard .pstat{font-size:12px;color:var(--ink-soft);font-style:italic;margin-bottom:10px;}
  .pcard .ptraits{font-size:13px;margin-bottom:12px;}
  .pcard .pangle{font-family:"Newsreader",serif;font-size:14px;line-height:1.45;background:var(--paper);border-radius:10px;padding:11px 13px;margin-bottom:10px;}
  .pcard .pobj{font-size:11.5px;color:var(--amber);background:var(--amber-soft);border-radius:9px;padding:9px 11px;margin-bottom:10px;}
  .pcard .pfind{font-size:11.5px;color:var(--ink-soft);}
  .pcard .pcount{position:absolute;top:18px;right:20px;font-family:"IBM Plex Mono",monospace;font-size:13px;color:var(--ink-soft);}
  .pcard .psamples{font-size:11.5px;color:var(--ink-soft);margin-top:10px;}
  .pcard .psamples b{color:var(--ink);font-weight:600;}

  .phase{border-left:3px solid var(--violet);background:var(--card);border:1px solid var(--line);border-radius:13px;padding:15px 17px;margin-bottom:12px;}
  .phase h4{margin:0 0 8px;font-size:14px;}
  .phase ul{margin:0;padding-left:18px;}
  .phase li{font-size:12.5px;margin-bottom:5px;color:var(--ink-soft);}
  .eco{display:flex;gap:11px;padding:10px 0;border-top:1px solid var(--line-soft);font-size:12.5px;}
  .eco:first-child{border-top:none;}
  .prow{display:flex;align-items:center;gap:10px;padding:9px 0;border-top:1px solid var(--line-soft);}
  .prow:first-child{border-top:none;}

  .authgate{position:fixed;inset:0;background:var(--paper);z-index:80;display:flex;align-items:center;justify-content:center;padding:24px;}
  .authcard{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:32px 30px;max-width:380px;width:100%;text-align:center;}
  .authcard h3{font-family:"Newsreader",serif;font-weight:500;font-size:23px;margin:14px 0 6px;}
  .authcard p{color:var(--ink-soft);font-size:13px;margin:0 0 18px;}
  .authcard input{font-family:inherit;font-size:14px;border:1px solid var(--line);border-radius:10px;padding:11px 13px;width:100%;margin-bottom:12px;}
  .authmsg{font-size:12.5px;margin-top:12px;min-height:18px;}
  .modal{position:fixed;inset:0;z-index:70;display:none;align-items:center;justify-content:center;padding:20px;background:rgba(22,22,31,.42);}
  .modal.on{display:flex;}
  .modalcard{background:var(--paper);border-radius:16px;padding:22px 24px;max-width:460px;width:100%;max-height:90vh;overflow-y:auto;}
  .modalcard h3{font-family:"Newsreader",serif;font-weight:500;font-size:20px;margin:0 0 4px;}
  .modalcard .mh{font-size:12px;color:var(--ink-soft);margin-bottom:16px;}

  .footnote{margin-top:30px;font-size:11.5px;color:var(--ink-soft);border-top:1px solid var(--line);padding-top:16px;}
  .legend{display:flex;gap:14px;flex-wrap:wrap;font-size:11px;color:var(--ink-soft);margin-top:10px;}
  .legend span{display:inline-flex;align-items:center;gap:5px;}
  .dot{width:9px;height:9px;border-radius:3px;display:inline-block;}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div class="wm">
      <svg width="30" height="30" viewBox="0 0 100 100" aria-hidden="true">
        <path d="M25 14 L39 14 L40 86 L24 86 Z" fill="#16161F"/>
        <circle cx="50" cy="36" r="22" fill="#16161F"/>
        <path d="M44 54 L56 51 L85 86 L68 86 Z" fill="#16161F"/>
        <path d="M50 27 L50 47 L40 37 Z" fill="#8B83F0"/>
        <path d="M50 27 L60 37 L50 47 Z" fill="#574FC7"/>
        <path d="M50 32 L55 37 L50 42 L45 37 Z" fill="#16161F"/>
      </svg>
      Renata<small>Beta CRM</small>
    </div>
    <div class="meta" id="hmeta"></div>
  </header>

  <nav class="tabs" id="tabs"></nav>

  <section class="panel" id="p-overview"></section>
  <section class="panel" id="p-pipeline"></section>
  <section class="panel" id="p-cohort"></section>
  <section class="panel" id="p-personas"></section>
  <section class="panel" id="p-gtm"></section>
  <section class="panel" id="p-employers"></section>

  <div class="footnote" id="foot"></div>
</div>

<div class="scrim" id="scrim"></div>
<aside class="drawer" id="drawer" aria-label="Lead detail"><div class="dpad" id="dpad"></div></aside>

<div class="modal" id="modal"><div class="modalcard" id="modalcard"></div></div>
<div class="authgate" id="authgate" style="display:none"></div>

<script src="./leads_data.js"></script>
<script src="./crm_config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function(){
  "use strict";
  var META = window.RENATA_META || null, STATIC = window.RENATA_LEADS || [];
  var CFG = window.RENATA_CRM_CONFIG || {};
  var SB_ON = !!(CFG.SUPABASE_URL && CFG.SUPABASE_ANON_KEY &&
                 CFG.SUPABASE_URL.indexOf("YOUR")<0 && window.supabase);
  var sb = SB_ON ? window.supabase.createClient(CFG.SUPABASE_URL, CFG.SUPABASE_ANON_KEY) : null;
  var ME = "local";
  var SVGNS = "http://www.w3.org/2000/svg";

  function el(tag, attrs){
    var n=document.createElement(tag), i, k;
    if(attrs) for(k in attrs){
      if(k==="class") n.className=attrs[k];
      else if(k==="text") n.textContent=attrs[k];
      else if(k.slice(0,2)==="on") n.addEventListener(k.slice(2), attrs[k]);
      else if(attrs[k]!=null) n.setAttribute(k, attrs[k]);
    }
    for(i=2;i<arguments.length;i++){
      var c=arguments[i]; if(c==null||c===false) continue;
      if(Array.isArray(c)) c.forEach(function(x){ if(x!=null&&x!==false) n.appendChild(typeof x==="string"?document.createTextNode(x):x); });
      else n.appendChild(typeof c==="string"?document.createTextNode(c):c);
    }
    return n;
  }
  function svgEl(tag, attrs){ var n=document.createElementNS(SVGNS,tag); for(var k in attrs){ n.setAttribute(k,attrs[k]); } return n; }
  function clear(n){ while(n.firstChild) n.removeChild(n.firstChild); }
  function colorVar(c){ return ({violet:"#574FC7",teal:"#0F7256",gold:"#B5852E",amber:"#8A5A0C",alert:"#A6342E",ink:"#5A5A6E"})[c]||"#574FC7"; }
  function gradeClass(g){ return ({A:"A",B:"B",C:"C","—":"x",IN:"IN"})[g]||"C"; }
  function today(){ return new Date().toISOString().slice(0,10); }

  // ---------- STORE ----------
  var LS_KEY="renata_crm_state_v2";
  var cache={ leadState:{}, touches:[], activation:[], inbound:[], partners:[] };
