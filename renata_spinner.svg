<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
<style>
.r{transform-box:view-box;transform-origin:50px 50px;}
.o{animation:rspin 13s linear infinite;} .m{animation:rspin 9s linear infinite reverse;}
.i{animation:rspin 6s linear infinite;}
.pt{animation:rpulse 2.6s ease-in-out infinite;transform-origin:73.8px 11.8px;transform-box:view-box;}
@keyframes rspin{to{transform:rotate(360deg);}}
@keyframes rpulse{0%,100%{opacity:.55;}50%{opacity:1;}}
@media(prefers-reduced-motion:reduce){.o,.m,.i,.pt{animation:none;}}
</style>
<g class="r o"><path d="M 70.00 15.36 A 40 40 0 1 1 30.00 15.36" fill="none" stroke="#16161F" stroke-width="4.2" stroke-linecap="round"/></g>
<g class="r m"><path d="M 78.56 44.96 A 29 29 0 1 1 59.92 22.75" fill="none" stroke="#16161F" stroke-width="4.8" stroke-linecap="round"/></g>
<g class="r i"><path d="M 63.79 61.57 A 18 18 0 1 1 66.91 43.84" fill="none" stroke="#16161F" stroke-width="5.4" stroke-linecap="round"/></g>
<circle class="pt" cx="73.85" cy="11.84" r="5" fill="#574FC7"/>
</svg>